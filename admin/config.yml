# Decap CMS configuration for the EmpireX admin
# Reference: https://decapcms.org/docs/configuration-options/
#
# Login flow:
#   visitor -> /admin/  -> Decap Bridge (PKCE) -> Google/Microsoft/password
#   The Bridge holds a fine-grained GitHub PAT (set up in the Bridge
#   dashboard, never in this repo) and uses git-gateway to commit on
#   our behalf. Only users authorized in the Bridge dashboard can log in.

backend:
  name: git-gateway
  repo: itsavibecode/empire
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/09e3b7b9-9d79-4fca-ae0f-9a6177bb81b4/pkce
  auth_token_endpoint: /sites/09e3b7b9-9d79-4fca-ae0f-9a6177bb81b4/token
  gateway_url: https://gateway.decapbridge.com

  # Commit message templates.
  # Intentionally generic — Decap Bridge's defaults interpolate
  # {{author-name}} (the admin's Google profile name), which would
  # leak a real name into the public git history. These templates
  # keep the audit trail (the "admin:" prefix) without that.
  commit_messages:
    create: 'admin: add {{collection}} entry "{{slug}}"'
    update: 'admin: update {{collection}}'
    delete: 'admin: remove {{collection}} entry "{{slug}}"'
    uploadMedia: 'admin: upload {{path}}'
    deleteMedia: 'admin: delete {{path}}'
    openAuthoring: 'admin: {{message}}'

# PKCE auth claims — map JWT fields from the Google login back to
# the Decap CMS user-info display (top-right "logged in as ..." chrome).
# Only visible to the logged-in user inside the CMS, not exposed publicly.
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Avatar uploads land in /avatars/ (same folder index.html reads from)
media_folder: avatars
public_folder: /avatars

# Commit straight to main — no editorial review workflow needed for solo admin
publish_mode: simple

# Display settings (visible inside the CMS UI)
site_url: https://ourempirex.com
display_url: https://ourempirex.com
logo_url: https://ourempirex.com/logo.png

collections:
  - name: roster
    label: Confirmed Streamers
    description: |
      The single source of truth for the streamer list shown across
      ourempirex.com, /obs/ (BRB scene), /promo/, and the SEO data.
      Saving here triggers a GitHub Action that regenerates the visible
      cards, JSON-LD performer list, keywords meta, and live-status JS
      automatically (~30 seconds after save).

      Drag rows to reorder — order shown here is the order on the site.
    files:
      - file: streamers.json
        label: Streamer roster
        name: streamers_file
        format: json
        fields:
          - name: streamers
            label: Streamers
            label_singular: Streamer
            widget: list
            collapsed: false
            summary: '{{fields.name}} — {{fields.url}}'
            fields:
              - name: slug
                label: 'Kick slug'
                widget: string
                hint: 'The part after kick.com/ — lowercase, no spaces. Used in DOM IDs and the live-status API call.'
              - name: name
                label: 'Display name'
                widget: string
                hint: "Shown on the cards. Use the streamer's preferred capitalization (e.g. lifeismizzy, MikeSmallsJr)."
              - name: url
                label: 'Kick URL'
                widget: string
                pattern: ['^https://kick\.com/.+', 'Must be an https://kick.com/... URL']
              - name: initials
                label: 'Initials'
                widget: string
                hint: '1–3 letters shown as fallback if the avatar image fails to load (e.g. "MS" for MikeSmallsJr).'
                pattern: ['^.{1,3}$', '1 to 3 characters']
              - name: avatar
                label: 'Avatar image'
                widget: image
                choose_url: false
                media_folder: '/avatars'
                public_folder: '/avatars'
                hint: 'Square works best. JPG or PNG. Will be saved under /avatars/.'
              # NOTE: `added_at` is NOT exposed here. The sync workflow
              # auto-fills it with today's date when a brand-new
              # streamer entry has none, then writes streamers.json
              # back. Editors don't need to think about it — adding a
              # streamer just gets them a 5-day "JUST ADDED" badge
              # automatically, dated to the day of save.

  - name: properties
    label: The Properties
    description: |
      The Airbnb properties shown in the "20+ Luxury Airbnb Homes" section.
      Each entry becomes one card on the live site.
      Saving here triggers the GitHub Action that regenerates the houses
      grid in index.html (~30 seconds after save).

      Drag rows to reorder — order shown here is the order on the site.
    files:
      - file: properties.json
        label: Property list
        name: properties_file
        format: json
        fields:
          - name: properties
            label: Properties
            label_singular: Property
            widget: list
            collapsed: false
            summary: '{{fields.title}} — {{fields.host_group}}'
            fields:
              - name: id
                label: 'Internal ID'
                widget: string
                hint: 'Used as the avatar filename. Lowercase, hyphens only (e.g. "the-baddest-tb"). Set once and leave alone — changing it after upload orphans the image file.'
                pattern: ['^[a-z0-9-]+$', 'Lowercase letters, digits, and hyphens only']
              - name: title
                label: 'Property title'
                widget: string
                hint: 'Shown as the bold heading on the card (e.g. "Townhouse in Kissimmee", "Home in Davenport").'
              - name: host_group
                label: 'Host group'
                widget: string
                hint: 'The streaming group hosting this property. The "Hosted by Empire Group, " prefix is added automatically — just enter the group name (e.g. "The Baddest (TB)").'
              - name: date_range
                label: 'Date range (optional)'
                widget: string
                required: false
                hint: 'Optional. If filled in, appears next to the host (e.g. "Jun 12-16"). Leave blank to omit.'
              - name: badge
                label: 'Status badge'
                widget: string
                default: 'Booked'
                hint: 'The small label in the top-right of the card. Defaults to "Booked".'
              - name: image
                label: 'Property photo'
                widget: image
                choose_url: false
                media_folder: '/houses'
                public_folder: '/houses'
                hint: 'Wide aspect (16:9 or similar) works best. JPG or PNG. Will be saved under /houses/.'

  - name: socials
    label: Social Bar (top-right)
    description: |
      The icons in the floating top-right social bar on every page.
      Pick a platform from the dropdown — the icon and styling are fixed
      (designed for visual consistency); just paste the link.

      Drag rows to reorder — left-to-right matches top-to-bottom here.
      Adding new platforms requires a code change (the icon library is curated);
      ask the dev to wire one up if you need something not in the dropdown.
    files:
      - file: socials.json
        label: Social links
        name: socials_file
        format: json
        fields:
          - name: socials
            label: Links
            label_singular: Link
            widget: list
            collapsed: false
            summary: '{{fields.platform}} → {{fields.url}}'
            fields:
              - name: platform
                label: 'Platform'
                widget: select
                options:
                  - { label: 'Kick', value: 'kick' }
                  - { label: 'Instagram', value: 'instagram' }
                  - { label: 'Discord', value: 'discord' }
                  - { label: 'YouTube', value: 'youtube' }
                  - { label: 'X (Twitter)', value: 'x' }
                  - { label: 'OBS Overlay (links to /obs/)', value: 'obs' }
                hint: 'The platform determines which icon appears. Icon designs are fixed.'
              - name: url
                label: 'URL'
                widget: string
                hint: 'Full https:// URL for external platforms (e.g. https://kick.com/empirex). For OBS, use /obs/ (the on-site overlay page).'
                pattern: ['^(https?://|/).+', 'Must be a full URL or a path starting with /']

  - name: about
    label: About The Event
    description: |
      The "About The Event" section just below the hero — small uppercase
      label, big title, descriptive paragraph, flyer image, and four detail
      rows (When / Where / Streaming Partner / Access).
      Saving here triggers the GitHub Action that regenerates this section
      in index.html (~30 seconds after save).
    files:
      - file: about.json
        label: About The Event content
        name: about_file
        format: json
        fields:
          - name: label
            label: 'Section label (small uppercase pill above the title)'
            widget: string
            hint: 'e.g. "About The Event"'
          - name: title
            label: 'Section title'
            widget: text
            hint: 'Press Enter for a line break (the site renders newlines as <br>). e.g. "The World''s First Live-Streamed[Enter]Reality Experience"'
          - name: description
            label: 'Description paragraph'
            widget: text
            hint: 'The body text below the title. Plain text — no HTML.'
          - name: flyer_image
            label: 'Flyer image'
            widget: image
            choose_url: false
            media_folder: '/'
            public_folder: '/'
            hint: 'The promotional flyer shown next to the details. Saved at the repo root (e.g. about-flyer.jpg) so existing references keep working.'
          - name: details
            label: 'Detail rows'
            label_singular: 'Detail row'
            widget: list
            collapsed: false
            summary: '{{fields.heading}}: {{fields.body}}'
            hint: 'Each row is a small heading + one line of text. Drag to reorder. Add or remove rows as needed.'
            fields:
              - name: heading
                label: 'Heading'
                widget: string
                hint: 'Short label, e.g. "When", "Where", "Access".'
              - name: body
                label: 'Body'
                widget: text
                hint: 'The text shown beneath the heading.'

  - name: seo
    label: SEO & Sharing
    description: |
      Search engine and social-share metadata for the homepage.
      "Page title" appears in browser tabs and search results, and is
      reused for social-share titles. Each description targets a specific
      audience: search crawlers, link previews on Facebook/LinkedIn, and
      link previews on X (Twitter). The share image is what shows up
      when someone pastes the link into a chat or social post.

      Other technical metadata (canonical URL, og:type, locale, image
      dimensions, JSON-LD structured data, keywords meta) stays
      code-managed and isn't editable here.
    files:
      - file: seo.json
        label: SEO content
        name: seo_file
        format: json
        fields:
          - name: page_title
            label: 'Page title'
            widget: string
            hint: 'Shown in browser tabs, Google results, and social-share previews. Aim for 50-60 characters.'
          - name: meta_description
            label: 'Description for search engines'
            widget: text
            hint: 'Shown in Google search snippets. Aim for 150-160 characters. Often starts with the brand name.'
          - name: og_description
            label: 'Description for social shares (Facebook, LinkedIn, etc.)'
            widget: text
            hint: 'Shown in link previews when someone shares the URL on Facebook, LinkedIn, Discord, etc. Can be a bit longer and more marketing-flavored than the search description.'
          - name: twitter_description
            label: 'Description for X (Twitter) previews'
            widget: text
            hint: 'Shown in link previews on X / Twitter. Keep it punchy — under 200 characters works best.'
          - name: share_image
            label: 'Share image'
            widget: image
            choose_url: false
            media_folder: '/'
            public_folder: '/'
            hint: 'The image that appears in link previews on Facebook, LinkedIn, X, Discord, etc. 1200x630 is the recommended size; square (1024x1024) also works. Saved at the repo root.'

  - name: cta
    label: CTA Buttons
    description: |
      The two big call-to-action buttons on the homepage.
      "Top button" lives in the hero (right under the meta grid — "Location /
      Duration / Access"). "Bottom button" lives at the very bottom of the
      page in the "Ready to Join Empire X?" footer section.

      Both buttons share the same gold-pill styling — only the text and the
      URL are editable here. Text is shown as-is (typing in ALL CAPS will
      display in ALL CAPS). External URLs open in a new tab automatically;
      same-origin paths starting with "/" open in the same tab.

      Saving here triggers the GitHub Action that regenerates the buttons
      in index.html (~30 seconds after save).
    files:
      - file: cta.json
        label: CTA buttons
        name: cta_file
        format: json
        fields:
          - name: top_button
            label: 'Top button (in the hero, under Location / Duration / Access)'
            widget: object
            fields:
              - name: text
                label: 'Button text'
                widget: string
                hint: 'Shown on the button. Typed exactly as entered (e.g. "CLICK HERE TO RSVP").'
              - name: url
                label: 'Button URL'
                widget: string
                hint: 'Where the button links. Full https://... URL for external sites, or a path starting with "/" for an in-site link.'
                pattern: ['^(https?://|/).+', 'Must be a full URL or a path starting with /']
          - name: bottom_button
            label: 'Bottom button (in the "Ready to Join Empire X?" footer)'
            widget: object
            fields:
              - name: text
                label: 'Button text'
                widget: string
                hint: 'Shown on the button. Typed exactly as entered (e.g. "Official Instagram").'
              - name: url
                label: 'Button URL'
                widget: string
                hint: 'Where the button links. Full https://... URL for external sites, or a path starting with "/" for an in-site link.'
                pattern: ['^(https?://|/).+', 'Must be a full URL or a path starting with /']

  - name: wristband
    label: Wristband Section
    description: |
      The "Official EmpireX Wristbands" section just above the Featured
      Group on the homepage — small uppercase pill, headline, paragraph,
      red warning line, and the wristband photo.

      Saving here triggers the GitHub Action that regenerates the section
      in index.html (~30 seconds after save).
    files:
      - file: wristband.json
        label: Wristband content
        name: wristband_file
        format: json
        fields:
          - name: label
            label: 'Section label (small uppercase pill above the headline)'
            widget: string
            hint: 'e.g. "Your Pass In"'
          - name: title
            label: 'Headline'
            widget: string
            hint: 'The big bold heading next to the photo. e.g. "Official EmpireX Wristbands"'
          - name: description
            label: 'Description paragraph'
            widget: text
            hint: 'The body text below the headline. Plain text — no HTML.'
          - name: warning
            label: 'Warning line (red callout)'
            widget: string
            required: false
            hint: 'The red attention line below the description. Leave blank to hide it. Emoji allowed (e.g. "⚠️ No wristband = No entry...").'
          - name: image
            label: 'Wristband photo'
            widget: image
            choose_url: false
            media_folder: '/'
            public_folder: '/'
            hint: 'The wristband product photo shown next to the text. Saved at the repo root.'
          - name: image_alt
            label: 'Photo alt text (for accessibility)'
            widget: string
            default: 'Our Empire Wristband'
            hint: 'Description of the photo for screen readers. e.g. "Our Empire Wristband".'

  - name: hall_of_fame
    label: Hall of Fame
    description: |
      The "Hall of Fame" ranked list shown above the "Ready to Join Empire X?"
      footer — three columns of groups with rank number, name, optional
      abbreviation, optional emoji, optional URL, and a country flag.

      Drag rows to reorder — rank numbers (01, 02, 03 ...) are auto-assigned
      from the order shown here. Add or remove rows freely; the column split
      (3 cols on desktop, 2 on tablet, 1 on mobile) auto-adjusts.

      Saving here triggers the GitHub Action that regenerates the section
      in index.html (~30 seconds after save).
    files:
      - file: hall-of-fame.json
        label: Hall of Fame content
        name: hall_of_fame_file
        format: json
        fields:
          - name: section_label
            label: 'Section label (small uppercase pill above the title — optional)'
            widget: string
            required: false
            default: ''
            hint: 'Optional small uppercase pill above the "Hall of Fame" title (e.g. "The Roster"). Leave blank to hide it entirely.'
          - name: title
            label: 'Section title'
            widget: string
            default: 'Hall of Fame'
            hint: 'The big gold heading. e.g. "Hall of Fame".'
          - name: subtitle
            label: 'Subtitle (line below the title)'
            widget: string
            default: 'Top 17 Most Influential Groups of All Time'
            hint: 'Shown directly under the title in muted caps.'
          - name: groups
            label: Groups
            label_singular: Group
            widget: list
            collapsed: false
            summary: '{{fields.name}} {{fields.abbreviation}} — {{fields.country}}'
            hint: 'Drag rows to reorder. Rank numbers (01, 02, 03 ...) auto-assign from this order.'
            fields:
              - name: name
                label: 'Name'
                widget: string
                hint: 'Group or person name. Mixed case OK — the site renders it in uppercase. e.g. "Derrick & Darnel", "Kozy".'
              - name: abbreviation
                label: 'Abbreviation (optional)'
                widget: string
                required: false
                hint: 'Optional short code shown in muted parentheses next to the name. e.g. "D&D", "BU", "DTB". Leave blank to omit.'
              - name: url
                label: 'Link URL (optional)'
                widget: string
                required: false
                hint: 'Optional. If filled in, the name becomes a clickable link to this URL. Leave blank for plain text. Full https://... URL.'
                pattern: ['^$|^https?://.+', 'Leave blank or enter a full http(s):// URL']
              - name: emoji
                label: 'Emoji (optional)'
                widget: string
                required: false
                hint: 'Optional small emoji shown right after the name (e.g. "🧸" for Kozy). Single emoji only. Leave blank to omit.'
              - name: country
                label: 'Country flag'
                widget: select
                default: 'us'
                options:
                  - { label: '🇺🇸 United States', value: 'us' }
                  - { label: '🇨🇦 Canada', value: 'ca' }
                  - { label: '🇲🇽 Mexico', value: 'mx' }
                  - { label: '🇨🇴 Colombia', value: 'co' }
                  - { label: '🇧🇷 Brazil', value: 'br' }
                  - { label: '🇦🇷 Argentina', value: 'ar' }
                  - { label: '🇨🇱 Chile', value: 'cl' }
                  - { label: '🇵🇪 Peru', value: 'pe' }
                  - { label: '🇻🇪 Venezuela', value: 've' }
                  - { label: '🇪🇸 Spain', value: 'es' }
                  - { label: '🇬🇧 United Kingdom', value: 'gb' }
                  - { label: '🇮🇪 Ireland', value: 'ie' }
                  - { label: '🇫🇷 France', value: 'fr' }
                  - { label: '🇩🇪 Germany', value: 'de' }
                  - { label: '🇮🇹 Italy', value: 'it' }
                  - { label: '🇳🇱 Netherlands', value: 'nl' }
                  - { label: '🇸🇪 Sweden', value: 'se' }
                  - { label: '🇵🇱 Poland', value: 'pl' }
                  - { label: '🇯🇵 Japan', value: 'jp' }
                  - { label: '🇰🇷 South Korea', value: 'kr' }
                  - { label: '🇨🇳 China', value: 'cn' }
                  - { label: '🇮🇳 India', value: 'in' }
                  - { label: '🇵🇭 Philippines', value: 'ph' }
                  - { label: '🇦🇺 Australia', value: 'au' }
                hint: 'Pick the country shown as a flag emoji on the right side of the row. Need a flag not in this list? Ask the dev to add it.'

  - name: display
    label: Display Settings
    description: |
      Site-wide display toggles. Right now there's just one switch:
      whether the Confirmed Streamers avatars render in black-and-white
      (with a colored hover) or in full color all the time. Applies to
      ALL streamer avatars at once — there is no per-streamer override.

      Saving here triggers the GitHub Action that updates the relevant
      attribute in index.html (~30 seconds after save).
    files:
      - file: display.json
        label: Display settings
        name: display_file
        format: json
        fields:
          - name: streamer_avatars_grayscale
            label: 'Streamer avatars in black-and-white'
            widget: boolean
            default: false
            hint: 'When ON: streamer avatars are black-and-white by default and turn colored when you hover (the original design). When OFF: avatars are full color all the time. Affects all streamers.'

  - name: featured_group
    label: Featured Group Section
    description: |
      The "Featured Group" section that highlights one streaming group
      (currently Sky9). Shows a small label pill, the group name as a
      big title, an optional tagline ("🏆 Hall of Fame Group"), a
      description, a list of detail rows (each with an emoji icon +
      heading + body), and the group's house photo.

      Drag detail rows to reorder. Add or remove rows as needed.
      Saving here triggers the GitHub Action that regenerates the
      section in index.html (~30 seconds after save).
    files:
      - file: featured-group.json
        label: Featured Group content
        name: featured_group_file
        format: json
        fields:
          - name: label
            label: 'Section label (small uppercase pill above the name)'
            widget: string
            default: 'Featured Group'
            hint: 'e.g. "Featured Group"'
          - name: name
            label: 'Group name (the big title)'
            widget: string
            hint: 'Shown as the section''s big bold title. e.g. "Sky9".'
          - name: tagline
            label: 'Tagline (optional gold pill above the description)'
            widget: string
            required: false
            hint: 'Optional small badge — leave blank to hide. Emoji allowed (e.g. "🏆 Hall of Fame Group").'
          - name: description
            label: 'Description paragraph'
            widget: text
            hint: 'The body text describing the group. Plain text — no HTML.'
          - name: details
            label: 'Detail rows'
            label_singular: 'Detail row'
            widget: list
            collapsed: false
            summary: '{{fields.icon}} {{fields.heading}} — {{fields.body}}'
            hint: 'Each row is an icon + heading + body. Drag to reorder. Add or remove rows as needed.'
            fields:
              - name: icon
                label: 'Icon (single emoji)'
                widget: string
                hint: 'A single emoji shown to the left of the row (e.g. "📅", "🏠", "🎤"). Use one emoji only.'
              - name: heading
                label: 'Heading'
                widget: string
                hint: 'Short label, e.g. "Wristband Admission", "Property".'
              - name: body
                label: 'Body'
                widget: text
                hint: 'The text shown beneath the heading.'
          - name: house_image
            label: 'House photo'
            widget: image
            choose_url: false
            media_folder: '/'
            public_folder: '/'
            hint: 'The group''s house / venue photo shown next to the details. Saved at the repo root.'
          - name: house_image_alt
            label: 'Photo alt text (for accessibility)'
            widget: string
            default: 'Featured group house'
            hint: 'Description of the photo for screen readers. e.g. "Sky9 Group House".'
