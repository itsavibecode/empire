<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, initial-scale=1" />
<title>Empire X — Be Right Back</title>

<!-- =====================================================================
     EMPIRE X · BRB OVERLAY
     Hosted at https://ourempirex.com/obs/
     Add as a 1920x1080 Browser Source in OBS.
===================================================================== -->
<script>
  const CONFIG = {
    // -------- ROSTER --------
    // Populated at runtime by fetch('/streamers.json') — see kickoff at the
    // bottom of this script. The JSON is the single source of truth for the
    // Confirmed Streamers list across ourempirex.com, /obs/, and /promo/.
    // To change the list, edit streamers.json (or use the admin CMS).
    ROSTER: [],

    // How often to re-check live status + viewer counts (ms).
    // 90 seconds is a good balance — responsive enough to catch streamers
    // going live without hammering the API.
    POLL_MS: 90_000,

    // If any streamers are live, how often the grid rotates through them
    // in groups of 6 (ms). Set high so viewers can settle in on a page.
    ROTATE_MS: 45_000,

    // -------- BACKGROUND VIDEOS --------
    VIDEOS_DIR: './videos/',
    VIDEOS_FALLBACK: ['empirexvideo.mp4'],
    VIDEO_OPACITY: 0.35,

    // -------- HEADER STAT --------
    // Shown between the top header and the grid. Right now it's a static
    // placeholder ("400 IN THE CHAT") until you wire it to real data.
    CHAT_COUNT_TEXT: '400 IN THE CHAT',
  };
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Inter+Tight:wght@400;500;700&display=swap');

  :root {
    --bg-0:       #070608;
    --bg-1:       #0d0b10;
    --bg-2:       #141118;
    --ink:        #f5efe1;
    --ink-dim:    #8a8275;
    --gold:       #d4a94a;
    --gold-hot:   #f2c764;
    --gold-dark:  #7a5f20;
    --kick:       #53fc18;
    --kick-glow:  #53fc1880;
    --danger:     #ff3b3b;
    --rule:       #2a2530;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: var(--bg-0);
    color: var(--ink);
    font-family: 'Inter Tight', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- BACKGROUND VIDEO LAYER ---------- */
  .bg-video {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    opacity: 0;
    transition: opacity .9s ease;
    pointer-events: none;
  }
  .bg-video.visible { opacity: var(--video-opacity, .35); }

  .bg-veil {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(212,169,74,.18), transparent 45%),
      radial-gradient(ellipse at 85% 85%, rgba(212,169,74,.12), transparent 50%),
      radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(7,6,8,.55) 80%, rgba(7,6,8,.85) 100%),
      linear-gradient(180deg, rgba(7,6,8,.35) 0%, rgba(13,11,16,.15) 50%, rgba(7,6,8,.45) 100%);
  }

  .bg-grain {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.9 0 0 0 0 0.8 0 0 0 0 0.5 0 0 0 0.5 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E");
    opacity: .06;
    mix-blend-mode: overlay;
  }

  .corner {
    position: fixed;
    width: 180px; height: 180px;
    border: 1px solid var(--gold-dark);
    z-index: 4;
    pointer-events: none;
  }
  .corner::before {
    content: ''; position: absolute; background: var(--gold);
  }
  .corner.tl { top: 32px; left: 32px; border-right: 0; border-bottom: 0; }
  .corner.tr { top: 32px; right: 32px; border-left: 0; border-bottom: 0; }
  .corner.bl { bottom: 32px; left: 32px; border-right: 0; border-top: 0; }
  .corner.br { bottom: 32px; right: 32px; border-left: 0; border-top: 0; }
  .corner.tl::before { top: -1px; left: 40px; width: 60px; height: 3px; }
  .corner.tr::before { top: -1px; right: 40px; width: 60px; height: 3px; }
  .corner.bl::before { bottom: -1px; left: 40px; width: 60px; height: 3px; }
  .corner.br::before { bottom: -1px; right: 40px; width: 60px; height: 3px; }

  .stage {
    position: relative;
    z-index: 5;
    width: 100%; height: 100%;
    display: grid;
    grid-template-columns: 1fr;
    /* rows: header · subtitle bar · content · footer */
    grid-template-rows: 132px 52px 1fr 88px;
    /* Padding clears the 32px corner offset + 180px corner size,
       giving content a symmetric safe zone inside the gold frame. */
    padding: 64px 88px 64px;
    gap: 16px;
  }

  /* ---------- HEADER ---------- */
  header {
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: .4em;
    color: var(--gold);
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(0,0,0,.8);
  }

  .mark {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 64px;
    letter-spacing: .18em;
    line-height: 1;
    background: linear-gradient(180deg, var(--gold-hot) 0%, var(--gold) 40%, var(--gold-dark) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 20px rgba(212,169,74,.3)) drop-shadow(0 2px 6px rgba(0,0,0,.9));
  }
  .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: .5em;
    color: var(--ink-dim);
    text-transform: uppercase;
    text-shadow: 0 0 8px rgba(0,0,0,.9);
  }

  /* ---------- SUBTITLE BAR ("TAPPED IN AND LIVE · 400 IN THE CHAT") ---------- */
  .subtitle-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }
  .subtitle-bar .divider {
    width: 1px; height: 28px; background: var(--gold-dark);
  }
  .subtitle-bar .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: .45em;
    color: var(--ink-dim);
    text-transform: uppercase;
    text-shadow: 0 0 8px rgba(0,0,0,.9);
    display: inline-flex; align-items: center; gap: 10px;
  }
  .subtitle-bar .chip {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 16px;
    border: 1px solid var(--gold-dark);
    background: rgba(7,6,8,.55);
    backdrop-filter: blur(4px);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: .3em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .subtitle-bar .chip .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--kick);
    box-shadow: 0 0 8px var(--kick-glow);
    animation: pulse-green 1.4s ease-in-out infinite;
  }
  .subtitle-bar .chat-count {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 24px;
    letter-spacing: .2em;
    color: var(--gold-hot);
    text-shadow: 0 0 14px rgba(242,199,100,.4), 0 2px 6px rgba(0,0,0,.9);
  }

  @keyframes pulse-green {
    0%, 100% { opacity: 1; }
    50%      { opacity: .4; }
  }

  /* ---------- CONTENT (grid or waiting state) ---------- */
  .content { min-height: 0; display: grid; }

  /* Grid layouts adapt to the live count so tiles always fill the
     container width and stay centered, no matter how many are live.
     The `data-count` attribute on .grid drives which layout is picked. */
  .grid {
    display: grid;
    gap: 22px;
    min-height: 0;
    width: 100%;
    height: 100%;
    place-items: stretch;
    justify-content: center;
    align-content: center;
  }

  /* 1 live → one big hero tile, 16:9 aspect, centered.
     Constrain BY HEIGHT (the limiting dimension) so a single big tile
     never exceeds the content row. Width scales from the height. */
  .grid[data-count="1"] {
    grid-template-columns: minmax(0, 1fr);
    grid-template-rows: minmax(0, 1fr);
    justify-items: center;
    align-items: center;
  }
  .grid[data-count="1"] > .tile {
    height: 100%;
    width: auto;
    aspect-ratio: 16 / 9;
    max-width: 100%;
    /* If width hits max-width (100% of col), height becomes the fixed dimension */
  }

  /* 2 live → two side-by-side. For two tiles to not overflow, each
     tile can be at most half the column width minus gap/2. We constrain
     width primarily and let aspect-ratio shrink height accordingly. */
  .grid[data-count="2"] {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    grid-template-rows: minmax(0, 1fr);
    justify-items: center;
    align-items: center;
    gap: 22px;
  }
  .grid[data-count="2"] > .tile {
    width: 100%;
    height: auto;
    aspect-ratio: 16 / 9;
    max-height: 100%;
  }

  /* 3 live → three across. Same approach: width-first sizing. */
  .grid[data-count="3"] {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    grid-template-rows: minmax(0, 1fr);
    justify-items: center;
    align-items: center;
    gap: 22px;
  }
  .grid[data-count="3"] > .tile {
    width: 100%;
    height: auto;
    aspect-ratio: 16 / 9;
    max-height: 100%;
  }
  /* 4 live → 2x2 grid */
  .grid[data-count="4"] {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    grid-template-rows: repeat(2, minmax(0, 1fr));
  }
  /* 5 live → top row of 3, bottom row of 2 centered */
  .grid[data-count="5"] {
    grid-template-columns: repeat(6, minmax(0, 1fr));
    grid-template-rows: repeat(2, minmax(0, 1fr));
  }
  .grid[data-count="5"] > .tile:nth-child(1) { grid-column: 1 / span 2; grid-row: 1; }
  .grid[data-count="5"] > .tile:nth-child(2) { grid-column: 3 / span 2; grid-row: 1; }
  .grid[data-count="5"] > .tile:nth-child(3) { grid-column: 5 / span 2; grid-row: 1; }
  .grid[data-count="5"] > .tile:nth-child(4) { grid-column: 2 / span 2; grid-row: 2; }
  .grid[data-count="5"] > .tile:nth-child(5) { grid-column: 4 / span 2; grid-row: 2; }
  /* 6+ live → classic 3x2 */
  .grid[data-count="6"] {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    grid-template-rows: repeat(2, minmax(0, 1fr));
  }

  .tile {
    position: relative;
    background: var(--bg-2);
    border: 1px solid var(--rule);
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow:
      0 0 0 1px rgba(212,169,74,.12) inset,
      0 24px 48px -24px rgba(0,0,0,.9);
    opacity: 0;
    animation: tile-in .7s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .tile:nth-child(1) { animation-delay: .05s; }
  .tile:nth-child(2) { animation-delay: .12s; }
  .tile:nth-child(3) { animation-delay: .19s; }
  .tile:nth-child(4) { animation-delay: .26s; }
  .tile:nth-child(5) { animation-delay: .33s; }
  .tile:nth-child(6) { animation-delay: .40s; }
  @keyframes tile-in {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tile::before {
    content: '';
    position: absolute; inset: 6px;
    border: 1px solid rgba(212,169,74,.22);
    pointer-events: none; z-index: 2;
  }

  .tile .live-badge {
    position: absolute; top: 12px; right: 12px;
    z-index: 4;
    display: flex; align-items: center; gap: 8px;
    background: rgba(7,6,8,.85);
    backdrop-filter: blur(6px);
    padding: 5px 10px;
    border: 1px solid var(--kick);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .2em;
    color: var(--kick);
  }
  .tile .live-badge::before {
    content: '';
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--kick);
    box-shadow: 0 0 8px var(--kick-glow);
    animation: pulse-green 1.4s ease-in-out infinite;
  }

  .tile .viewers-badge {
    position: absolute; top: 12px; left: 12px;
    z-index: 4;
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(7,6,8,.85);
    backdrop-filter: blur(6px);
    padding: 5px 10px;
    border: 1px solid var(--gold-dark);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .2em;
    color: var(--gold);
  }
  .tile .viewers-badge::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 6px var(--gold);
  }

  /* ---------- FEATURED TILE (the one with audio on) ---------- */
  .tile-featured {
    box-shadow:
      0 0 0 2px var(--gold-hot) inset,
      0 0 40px rgba(242,199,100,.25),
      0 24px 48px -24px rgba(0,0,0,.9) !important;
    animation: tile-in .7s cubic-bezier(.2,.7,.2,1) forwards, featured-glow 2.4s ease-in-out infinite;
  }
  .tile-featured::before {
    border-color: rgba(242,199,100,.55) !important;
  }
  @keyframes featured-glow {
    0%, 100% { box-shadow:
      0 0 0 2px var(--gold-hot) inset,
      0 0 40px rgba(242,199,100,.25),
      0 24px 48px -24px rgba(0,0,0,.9); }
    50%      { box-shadow:
      0 0 0 2px var(--gold-hot) inset,
      0 0 60px rgba(242,199,100,.45),
      0 24px 48px -24px rgba(0,0,0,.9); }
  }

  .tile .audio-badge {
    position: absolute;
    top: 52px; right: 12px;  /* sits just below the LIVE badge */
    z-index: 4;
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(242,199,100,.95);
    color: #1a1208;
    padding: 5px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: .2em;
    box-shadow: 0 0 14px rgba(242,199,100,.6);
  }
  .tile .audio-badge .audio-icon {
    font-size: 14px;
    display: inline-block;
    animation: audio-wave 1s ease-in-out infinite;
  }
  @keyframes audio-wave {
    0%, 100% { transform: scaleY(1); }
    50%      { transform: scaleY(1.3); }
  }

  .tile .embed {
    position: relative;
    flex: 1;
    background: #000;
    overflow: hidden;
  }
  .tile .embed iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: 0;
  }

  .tile .placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a1520 0%, #0c0a10 100%);
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: .25em;
    text-transform: uppercase;
  }

  .tile .bar {
    position: relative;
    z-index: 3;
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px;
    background: linear-gradient(180deg, rgba(15,12,19,.95) 0%, rgba(9,7,11,.98) 100%);
    border-top: 1px solid var(--rule);
  }

  .tile .kick-logo {
    flex-shrink: 0;
    width: 30px; height: 30px;
    background: var(--kick);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 14px var(--kick-glow);
  }
  .tile .kick-logo svg { width: 20px; height: 20px; }

  .tile .who {
    display: flex; flex-direction: column; gap: 2px;
    min-width: 0;
  }
  .tile .name {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: .02em;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tile .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .2em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .tile .meta .platform { color: var(--kick); }

  /* ---------- LOADING / WAITING STATES ---------- */
  .waiting {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 24px;
    color: var(--ink-dim);
    text-align: center;
    padding: 60px;
  }
  .waiting .big {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 44px;
    letter-spacing: .25em;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(212,169,74,.4);
  }
  .waiting .sub-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; letter-spacing: .3em;
    text-transform: uppercase;
    max-width: 900px; line-height: 1.8;
  }
  .waiting .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--gold-dark);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- FOOTER ---------- */
  footer {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 40px;
    padding-top: 18px;
    border-top: 1px solid var(--rule);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: .3em;
    color: var(--ink-dim);
    text-transform: uppercase;
    text-shadow: 0 0 8px rgba(0,0,0,.9);
  }
  footer .right { text-align: right; }

  .rotation-progress {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-hot));
    width: 0%;
    z-index: 10;
    box-shadow: 0 0 8px rgba(212,169,74,.6);
  }
</style>
</head>
<body>

<!-- Two video elements for crossfade shuffle -->
<video class="bg-video" id="bgA" muted playsinline preload="auto"></video>
<video class="bg-video" id="bgB" muted playsinline preload="auto"></video>

<div class="bg-veil"></div>
<div class="bg-grain"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="rotation-progress" id="rotationProgress"></div>

<div class="stage">

  <header>
    <div class="eyebrow">The Party Never Stops</div>
    <div class="mark">EMPIREX</div>
    <div class="sub">PROJECTX MEETS IRL STREAMING LIVE</div>
  </header>

  <div class="subtitle-bar">
    <span class="chip"><span class="dot"></span>TAPPED IN AND LIVE</span>
    <span class="divider"></span>
    <span class="chat-count" id="chatCount">400 IN THE CHAT</span>
    <span class="divider"></span>
    <span class="label" id="liveSummary">— Live —</span>
  </div>

  <div class="content" id="content">
    <div class="waiting">
      <div class="spinner"></div>
      <div class="big">400.</div>
      <div class="sub-line">Checking for other streams live…</div>
    </div>
  </div>

  <footer>
    <div class="left">ourempirex.com</div>
    <div class="right">Stream switches back shortly</div>
  </footer>

</div>

<script>
  document.documentElement.style.setProperty('--video-opacity', CONFIG.VIDEO_OPACITY);

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function fmtViewers(n) {
    if (n == null) return '—';
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
    if (n >= 1_000)     return (n / 1_000).toFixed(n >= 10_000 ? 0 : 1) + 'K';
    return String(n);
  }

  /* ==================================================================
     BACKGROUND VIDEO — shuffle through videos/*.mp4, crossfade between
     two <video> elements so there's never a black flash.
  ================================================================== */
  const videoA = document.getElementById('bgA');
  const videoB = document.getElementById('bgB');
  let activeVideo = videoA;
  let inactiveVideo = videoB;
  let videoQueue = [];
  let videoList = [];

  async function discoverVideos() {
    try {
      const r = await fetch(`${CONFIG.VIDEOS_DIR}videos.json?t=${Date.now()}`, { cache: 'no-store' });
      if (r.ok) {
        const j = await r.json();
        if (Array.isArray(j.videos) && j.videos.length) return j.videos;
      }
    } catch (_) {}
    return CONFIG.VIDEOS_FALLBACK;
  }

  function nextVideoSrc() {
    if (videoQueue.length === 0) videoQueue = shuffle(videoList);
    const filename = videoQueue.shift();
    return filename ? `${CONFIG.VIDEOS_DIR}${filename}` : null;
  }

  function swapToNextVideo() {
    const src = nextVideoSrc();
    if (!src) return;

    inactiveVideo.src = src;
    inactiveVideo.load();
    inactiveVideo.oncanplay = () => {
      inactiveVideo.play().catch(() => {});
      inactiveVideo.classList.add('visible');
      activeVideo.classList.remove('visible');

      setTimeout(() => {
        activeVideo.pause();
        activeVideo.removeAttribute('src');
        activeVideo.load();
        [activeVideo, inactiveVideo] = [inactiveVideo, activeVideo];
      }, 1000);
    };
  }

  async function startBackgroundVideos() {
    videoList = await discoverVideos();
    if (!videoList || videoList.length === 0) return;
    videoQueue = shuffle(videoList);

    const first = nextVideoSrc();
    activeVideo.src = first;
    activeVideo.load();
    activeVideo.oncanplay = () => {
      activeVideo.play().catch(() => {});
      activeVideo.classList.add('visible');
    };

    videoA.addEventListener('ended', swapToNextVideo);
    videoB.addEventListener('ended', swapToNextVideo);
  }

  startBackgroundVideos();

  /* ==================================================================
     KICK LIVE STATUS — uses the same method as ourempirex.com's
     Confirmed Streamers section: fetch `kick.com/api/v2/channels/{slug}`
     through a public CORS proxy. The response has a `livestream` object
     (null if offline) with `viewer_count`, `session_title`, etc.
  ================================================================== */
  const PROXIES = [
    // allorigins /raw — returns the target response directly (no JSON wrapper).
    // More reliable than /get when the response is already JSON.
    s => ({
      url: `https://api.allorigins.win/raw?url=${encodeURIComponent('https://kick.com/api/v2/channels/' + s)}`,
      wrapped: false,
    }),
    // corsproxy.io — uses explicit ?url= param per current docs. Direct raw pass-through.
    s => ({
      url: `https://corsproxy.io/?url=${encodeURIComponent('https://kick.com/api/v2/channels/' + s)}`,
      wrapped: false,
    }),
    // allorigins /get — JSON wrapper. Last resort since it's slower and has lower rate limits.
    s => ({
      url: `https://api.allorigins.win/get?url=${encodeURIComponent('https://kick.com/api/v2/channels/' + s)}`,
      wrapped: true,
    }),
  ];

  // Try ONE proxy. Resolves with a valid live-status object on success,
  // REJECTS on any failure (so Promise.any below picks the first success).
  async function tryProxy(build, slug) {
    const lower = slug.toLowerCase();
    const { url, wrapped } = build(lower);
    // Reduced from 12s → 6s. Healthy proxies respond in <1 sec; if a
    // proxy is taking longer than 6s it's almost certainly never going
    // to come back, and we have other proxies racing in parallel.
    const res = await fetch(url, { signal: AbortSignal.timeout(6000) });
    if (!res.ok) throw new Error('http ' + res.status);
    const text = await res.text();
    if (!text) throw new Error('empty');
    let data;
    if (wrapped) {
      const wrapper = JSON.parse(text);
      if (!wrapper || !wrapper.contents) throw new Error('no contents');
      data = JSON.parse(wrapper.contents);
    } else {
      data = JSON.parse(text);
    }
    if (!data || typeof data !== 'object') throw new Error('not object');
    // Sanity check: real Kick channel responses have id/slug/user_id.
    if (data.id == null && data.slug == null && data.user_id == null) {
      throw new Error('not a kick channel response');
    }
    const ls = data.livestream;
    const isLive = !!ls && (ls.is_live === true || ls.viewer_count != null);
    return {
      username: slug,
      isLive,
      viewers: isLive ? Number(ls.viewer_count || 0) : 0,
      title: isLive ? (ls.session_title || '') : '',
      known: true,
    };
  }

  // Race ALL proxies in parallel. Promise.any resolves with the first
  // proxy that returns a valid result — no more sequential fallback
  // waiting up to 36s per channel. Typical case is <1s for the fastest
  // proxy. If ALL proxies fail, we return an "unknown" result.
  async function fetchChannelLive(slug) {
    try {
      return await Promise.any(PROXIES.map(build => tryProxy(build, slug)));
    } catch {
      return { username: slug, isLive: false, viewers: 0, known: false };
    }
  }

  // Bumped WORKERS 3 → 8 so larger rosters parallelize better. Each
  // worker now also receives an `onResult` callback so the UI can
  // re-render incrementally as live streamers are discovered, instead
  // of waiting for all 26 fetches to settle.
  async function fetchAllLive(onResult) {
    const results = new Array(CONFIG.ROSTER.length);
    let cursor = 0;
    const WORKERS = 8;

    async function worker() {
      while (cursor < CONFIG.ROSTER.length) {
        const i = cursor++;
        const r = await fetchChannelLive(CONFIG.ROSTER[i]);
        results[i] = r;
        if (onResult) onResult(r, results);
      }
    }

    await Promise.all(Array.from({ length: WORKERS }, worker));
    return results;
  }

  // localStorage cache so the page shows the last-known live grid
  // INSTANTLY on load while fresh polling happens in the background.
  // Cache is considered fresh for 5 minutes.
  const LIVE_CACHE_KEY = 'obs-live-cache-v1';
  const LIVE_CACHE_TTL_MS = 5 * 60 * 1000;
  function saveLiveCache(results) {
    try {
      localStorage.setItem(LIVE_CACHE_KEY, JSON.stringify({
        ts: Date.now(),
        results: results.filter(r => r && r.isLive),
      }));
    } catch (e) { /* quota / private mode — ignore */ }
  }
  function loadLiveCache() {
    try {
      const raw = localStorage.getItem(LIVE_CACHE_KEY);
      if (!raw) return null;
      const c = JSON.parse(raw);
      if (Date.now() - c.ts > LIVE_CACHE_TTL_MS) return null;
      return c.results;
    } catch (e) { return null; }
  }

  /* ==================================================================
     GRID — render only live streamers, ordered by viewer count desc.
     No ranking numbers. If more than 6 live, rotate through pages of 6.
  ================================================================== */
  const content = document.getElementById('content');
  const liveSummary = document.getElementById('liveSummary');
  const rotationProgress = document.getElementById('rotationProgress');

  const KICK_SVG = `
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path fill="#000" d="M3 3h5v6h3V6h3V3h5v6h-3v3h-3v3h3v3h3v3h-5v-3h-3v-3H8v6H3z"/>
    </svg>`;

  function tileHTML(s, opts = {}) {
    const name = s.username;
    const isTop = !!opts.isTop;
    // Top streamer (highest viewer count on the current page) plays with
    // audio unmuted. All others stay muted so the scene isn't chaos.
    // Kick's player accepts `muted=false` as the signal to play audio.
    const muted = isTop ? 'false' : 'true';
    const src = `https://player.kick.com/${encodeURIComponent(name)}?autoplay=true&muted=${muted}`;
    const audioBadge = isTop
      ? '<div class="audio-badge"><span class="audio-icon">♪</span>AUDIO LIVE</div>'
      : '';
    const tileClass = isTop ? 'tile tile-featured' : 'tile';
    return `
      <div class="${tileClass}">
        <div class="viewers-badge">${fmtViewers(s.viewers)} VIEWERS</div>
        <div class="live-badge">LIVE</div>
        ${audioBadge}
        <div class="embed">
          <div class="placeholder">Loading ${name}…</div>
          <iframe
            data-streamer="${name}"
            data-featured="${isTop}"
            src="${src}"
            allow="autoplay; fullscreen; encrypted-media"
            allowfullscreen
            scrolling="no"
            frameborder="0"></iframe>
        </div>
        <div class="bar">
          <div class="kick-logo" title="Kick">${KICK_SVG}</div>
          <div class="who">
            <div class="name">${name}</div>
            <div class="meta">Live on <span class="platform">Kick</span></div>
          </div>
        </div>
      </div>`;
  }

  function renderWaiting(msg, sub) {
    content.innerHTML = `
      <div class="waiting">
        <div class="spinner"></div>
        <div class="big">${msg}</div>
        <div class="sub-line">${sub}</div>
      </div>`;
  }

  function renderNoneLive() {
    // Party vibe — no "Arena is Quiet" doom. Keep it light.
    content.innerHTML = `
      <div class="waiting">
        <div class="big">WARMING UP</div>
        <div class="sub-line">
          The network is live soon. Hang tight — the first streamers go live any minute.
        </div>
      </div>`;
  }

  // Pagination state
  let livePages = [];           // array of arrays (each of length ≤ 6)
  let currentPageIdx = 0;
  let rotateTimer = null;

  function renderPage(idx) {
    const page = livePages[idx];
    if (!page || page.length === 0) return;
    // Page is already sorted by viewers desc — first tile is the featured one.
    const count = Math.min(page.length, 6);
    const tiles = page.map((s, i) => tileHTML(s, { isTop: i === 0 })).join('');
    content.innerHTML = `<div class="grid" data-count="${count}">${tiles}</div>`;
  }

  function startRotation() {
    if (rotateTimer) clearInterval(rotateTimer);
    renderPage(currentPageIdx);
    resetProgressBar();

    if (livePages.length > 1) {
      rotateTimer = setInterval(() => {
        currentPageIdx = (currentPageIdx + 1) % livePages.length;
        renderPage(currentPageIdx);
        resetProgressBar();
      }, CONFIG.ROTATE_MS);
    }
  }

  function resetProgressBar() {
    if (livePages.length <= 1) {
      rotationProgress.style.width = '0%';
      return;
    }
    rotationProgress.style.transition = 'none';
    rotationProgress.style.width = '0%';
    void rotationProgress.offsetWidth;
    rotationProgress.style.transition = `width ${CONFIG.ROTATE_MS}ms linear`;
    rotationProgress.style.width = '100%';
  }

  function updateSummary(liveCount, totalViewers) {
    const viewers = fmtViewers(totalViewers);
    liveSummary.textContent = liveCount === 0
      ? '— Warming Up —'
      : `— ${liveCount} Live · ${viewers} Viewers —`;
  }

  // Re-render the grid given a list of (currently known) live streamers.
  // Extracted so we can call it incrementally as fetch results arrive.
  function applyLiveResults(live, options = {}) {
    live = live.slice().sort((a, b) => (b.viewers || 0) - (a.viewers || 0));
    const totalViewers = live.reduce((sum, s) => sum + (s.viewers || 0), 0);
    updateSummary(live.length, totalViewers);

    if (live.length === 0) {
      // Only show the "none live" state if this is a final result
      // (otherwise an in-progress poll would keep flicking the grid
      // empty as the first few non-live results come back).
      if (options.final) {
        livePages = [];
        currentPageIdx = 0;
        if (rotateTimer) clearInterval(rotateTimer);
        renderNoneLive();
        rotationProgress.style.width = '0%';
      }
      return;
    }

    const pages = [];
    for (let i = 0; i < live.length; i += 6) {
      pages.push(live.slice(i, i + 6));
    }

    // Preserve current page index if the live set hasn't changed
    const sameAsBefore = JSON.stringify(pages.map(p => p.map(x => x.username))) ===
                         JSON.stringify(livePages.map(p => p.map(x => x.username)));
    livePages = pages;
    if (!sameAsBefore) currentPageIdx = 0;
    startRotation();
  }

  async function poll() {
    try {
      // Stream results in as each channel resolves. The first live
      // streamer found shows up in the grid within a second or two
      // instead of waiting for the entire roster to finish polling.
      const results = await fetchAllLive((r, allSoFar) => {
        const liveSoFar = allSoFar.filter(x => x && x.isLive);
        if (liveSoFar.length > 0) applyLiveResults(liveSoFar);
      });
      const live = results.filter(r => r && r.isLive);
      applyLiveResults(live, { final: true });
      // Save successful poll to cache so next page-load is instant
      saveLiveCache(results);
    } catch (err) {
      console.warn('[BRB] poll failed:', err);
      // Keep showing whatever we had last time; don't crash the UI.
    }
  }

  // Load roster from /streamers.json (single source of truth), then start polling.
  // If the fetch fails, the grid stays empty and we log to console rather than crash.
  fetch('/streamers.json', { cache: 'no-cache' })
    .then(r => r.json())
    .then(data => {
      const list = Array.isArray(data) ? data : (data.streamers || []);
      CONFIG.ROSTER = list.map(s => s.name);
      // INSTANT FIRST PAINT: if we have a recent cache (< 5 min old),
      // render those streamers right away so the page isn't blank
      // while the first poll is in flight. Fresh data overwrites this
      // as soon as it arrives.
      const cached = loadLiveCache();
      if (cached && cached.length > 0) {
        applyLiveResults(cached);
      }
      poll();
      setInterval(poll, CONFIG.POLL_MS);
    })
    .catch(err => {
      console.error('[BRB] Failed to load /streamers.json:', err);
    });
</script>

</body>
</html>
