<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>EmpireX - Slots</title>
  <link rel="icon" href="/logo.png">
  <link href="https://fonts.googleapis.com/css?family=VT323" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="set-fun">
  <!-- Tab switcher: pick which symbol set to spin -->
  <nav class="tabs" aria-label="Choose symbol set">
    <button type="button" class="tab is-active" data-set="fun">Fun</button>
    <button type="button" class="tab" data-set="more-fun">More Fun</button>
  </nav>

  <!-- Audio controls cluster (top-right). Background-music volume slider
       + mute toggle. Sound plays only after the user's first interaction
       (browser autoplay-policy requirement). -->
  <div class="audio-controls">
    <input type="range" id="bg-volume" class="bg-volume" min="0" max="100" value="50" aria-label="Background music volume">
    <button type="button" id="mute-toggle" class="mute-toggle" aria-label="Toggle audio">
      <svg class="icon-on" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <svg class="icon-off" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.96 8.96 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.17v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
    </button>
  </div>

  <!-- Dev mode panel (only visible when ?dev=1 is in the URL) -->
  <div class="dev-panel" id="dev-panel" hidden>
    <div class="dev-panel-title">DEV MODE</div>
    <button type="button" data-prize="0">Force win: Cx</button>
    <button type="button" data-prize="2">Force win: 400</button>
    <button type="button" data-prize="1">Force win: Nick White wins</button>
    <button type="button" data-prize="loser">Force LOSER</button>
    <button type="button" data-prize="reset">Reset</button>
  </div>

  <div class="app"></div>

  <div class="helper">Press a key or tap on mobile</div>

  <!-- BookHockeys cross-link sits above the URL caption. Opacity rises
       on hover. The whole bottom block (logo + caption + version) is
       captured into the Save-as-PNG download. -->
  <a href="https://bookhockeys.com" target="_blank" rel="noopener" aria-label="BookHockeys" class="game-bookhockeys">
    <img src="/bookhockeys-logo.png" alt="BookHockeys">
  </a>
  <div class="game-url">ourempirex.com/game</div>
  <div class="game-version">v0.10.13</div>

  <!-- Audio elements. Files are not committed; drop your own MP3/OGG
       files into game/audio/ and they'll auto-load. If a file is
       missing the audio element silently does nothing. Filenames:
         bg-music.mp3       — looping background track
         win-cx.mp3         — top-prize sound
         win-400.mp3        — mid-prize sound
         win-nickwhite.mp3  — low-prize sound
         lose.mp3           — no-match sound -->
  <audio id="bg-music" loop preload="auto">
    <source src="audio/bg-music.mp3" type="audio/mpeg">
    <source src="audio/bg-music.ogg" type="audio/ogg">
  </audio>
  <audio id="sound-cx" preload="auto">
    <source src="audio/win-cx.mp3" type="audio/mpeg">
    <source src="audio/win-cx.ogg" type="audio/ogg">
  </audio>
  <audio id="sound-400" preload="auto">
    <source src="audio/win-400.mp3" type="audio/mpeg">
    <source src="audio/win-400.ogg" type="audio/ogg">
  </audio>
  <audio id="sound-nickwhite" preload="auto">
    <source src="audio/win-nickwhite.mp3" type="audio/mpeg">
    <source src="audio/win-nickwhite.ogg" type="audio/ogg">
  </audio>
  <audio id="sound-loser" preload="auto">
    <source src="audio/lose.mp3" type="audio/mpeg">
    <source src="audio/lose.ogg" type="audio/ogg">
  </audio>
  <audio id="sound-woosh" preload="auto">
    <source src="audio/woosh-sound-effect.mp3" type="audio/mpeg">
    <source src="audio/woosh-sound-effect.ogg" type="audio/ogg">
  </audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/15.1.0/react.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/15.1.0/react-dom.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/index.js"></script>
</body>

</html>
