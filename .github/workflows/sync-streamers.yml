name: Sync content (streamers + properties + socials + about + seo)

# When any *.json content file changes (typically from a Decap CMS commit),
# regenerate the derived blocks in index.html and llms.txt.
# Path filter prevents this workflow from re-triggering itself.

on:
  push:
    branches: [main]
    paths:
      - streamers.json
      - properties.json
      - socials.json
      - about.json
      - seo.json

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync streamers (cards, JSON-LD, keywords, JS array, llms.txt)
        env:
          REPO_PATH: ${{ github.workspace }}
        run: python .github/scripts/sync-streamers.py

      - name: Sync properties (houses-grid in index.html)
        env:
          REPO_PATH: ${{ github.workspace }}
        run: python .github/scripts/sync-properties.py

      - name: Sync social bar (top-right links in index.html)
        env:
          REPO_PATH: ${{ github.workspace }}
        run: python .github/scripts/sync-socials.py

      - name: Sync About The Event section in index.html
        env:
          REPO_PATH: ${{ github.workspace }}
        run: python .github/scripts/sync-about.py

      - name: Sync SEO meta tags + title in index.html
        env:
          REPO_PATH: ${{ github.workspace }}
        run: python .github/scripts/sync-seo.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html llms.txt
          if git diff --cached --quiet; then
            echo "Nothing to sync."
          else
            git commit -m "chore: regenerate streamer/property/social/about/seo derived blocks"
            git push
          fi
