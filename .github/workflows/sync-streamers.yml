name: Sync streamers

# When streamers.json changes (typically from a Decap CMS commit),
# regenerate the streamer-derived blocks in index.html and llms.txt.
# Path filter prevents this workflow from re-triggering itself.

on:
  push:
    branches: [main]
    paths:
      - streamers.json

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Token with write access so the bot's commit can be pushed back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sync script
        env:
          REPO_PATH: ${{ github.workspace }}
        run: python .github/scripts/sync-streamers.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html llms.txt
          if git diff --cached --quiet; then
            echo "Nothing to sync."
          else
            git commit -m "chore: regenerate streamer-derived blocks from streamers.json"
            git push
          fi
