<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EmpireX Creator Overlay — Stream Widget</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="https://ourempirex.com/promo/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="https://ourempirex.com/promo/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     EMPIREX CREATOR OVERLAY — COMPACT
     Top:    "Come watch me live at / EMPIREX on [Kick]"
     Bottom: crown + countdown + ourempirex.com
     Position: ?pos=tl|tr|bl|br  (default tl)
     ============================================================ */

  :root{
    --gold:#D4A843;
    --gold-light:#F0D68A;
    --gold-dark:#A17A28;
    --black:#0A0A0A;
    --white:#F5F1EB;
    --kick-green:#53FC18;
    --card-bg:rgba(10,10,10,0.82);
    --card-border:rgba(212,168,67,0.35);
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  html,body{
    width:100%;height:100%;
    background:transparent !important;
    overflow:hidden;
    font-family:'Space Grotesk',sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .widget{
    position:fixed;
    padding:10px 16px 10px 14px;
    min-width:0;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:12px;
    backdrop-filter:blur(10px) saturate(140%);
    -webkit-backdrop-filter:blur(10px) saturate(140%);
    box-shadow:
      0 0 0 1px rgba(212,168,67,0.08) inset,
      0 8px 32px -10px rgba(0,0,0,0.6),
      0 0 50px -22px rgba(212,168,67,0.25),
      0 0 40px -24px rgba(83,252,24,0.35);
    animation:slide-in 900ms cubic-bezier(.22,.68,.2,1) 200ms both;
  }
  .widget::before{
    content:"";
    position:absolute;
    top:-1px; left:16%; right:16%;
    height:1px;
    background:linear-gradient(90deg,transparent,var(--kick-green) 50%,transparent);
    opacity:.55;
  }
  .widget::after{
    content:"";
    position:absolute;
    bottom:-1px; left:16%; right:16%;
    height:1px;
    background:linear-gradient(90deg,transparent,var(--gold) 50%,transparent);
    opacity:.7;
  }

  .pos-tl{top:24px;    left:24px}
  .pos-tr{top:24px;    right:24px}
  .pos-bl{bottom:24px; left:24px}
  .pos-br{bottom:24px; right:24px}

  @keyframes slide-in{
    from{opacity:0;transform:translateY(-6px)}
    to  {opacity:1;transform:translateY(0)}
  }
  .pos-bl,.pos-br{animation-name:slide-up}
  @keyframes slide-up{
    from{opacity:0;transform:translateY(6px)}
    to  {opacity:1;transform:translateY(0)}
  }

  /* =========================================================
     TOP: "Come watch me live at / EMPIREX on [Kick]"
     Two tight lines, no extra chrome
     ========================================================= */
  .watch-headline{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-size:9.5px;
    letter-spacing:.24em;
    text-transform:uppercase;
    font-weight:600;
    color:var(--kick-green);
    text-shadow:0 0 10px rgba(83,252,24,0.35);
    margin-bottom:5px;
  }
  .kick-dot{
    display:inline-block;
    width:5px;height:5px;
    background:var(--kick-green);
    border-radius:50%;
    box-shadow:0 0 7px var(--kick-green);
    animation:kick-pulse 1.4s ease-in-out infinite;
  }
  @keyframes kick-pulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%    {opacity:.5;transform:scale(1.3)}
  }

  .watch-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:9px;
  }
  .watch-empirex{
    font-family:'Cormorant Garamond',serif;
    font-weight:700;
    font-size:19px;
    line-height:1;
    letter-spacing:.08em;
    background:linear-gradient(135deg,var(--gold-light),var(--gold) 50%,var(--gold-dark));
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    color:var(--gold);
  }
  .watch-empirex .x{font-style:italic}
  .on-word{
    font-size:9.5px;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:rgba(245,241,235,0.5);
    font-weight:500;
  }
  .kick-logo{
    height:18px;
    width:auto;
    object-fit:contain;
    filter:drop-shadow(0 0 8px rgba(83,252,24,0.5));
  }

  /* =========================================================
     DIVIDER between halves — slim
     ========================================================= */
  .split{
    margin:9px -4px 8px;
    height:1px;
    background:linear-gradient(90deg,
      transparent 0%,
      rgba(83,252,24,0.22) 30%,
      rgba(212,168,67,0.28) 70%,
      transparent 100%);
  }

  /* =========================================================
     BOTTOM: crown + countdown inline + site URL
     ========================================================= */
  .bottom-row{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .logo-gold{
    width:34px; height:34px;
    flex-shrink:0;
    object-fit:contain;
    filter:
      drop-shadow(0 0 5px rgba(212,168,67,0.35))
      drop-shadow(0 1px 3px rgba(0,0,0,0.5));
    animation:logo-breathe 4.5s ease-in-out infinite;
  }
  @keyframes logo-breathe{
    0%,100%{filter:drop-shadow(0 0 5px rgba(212,168,67,0.35)) drop-shadow(0 1px 3px rgba(0,0,0,.5))}
    50%    {filter:drop-shadow(0 0 12px rgba(212,168,67,0.55)) drop-shadow(0 1px 3px rgba(0,0,0,.5))}
  }

  .countdown{
    display:flex;
    align-items:baseline;
    gap:7px;
  }
  .cd-unit{display:flex;flex-direction:column;align-items:center;min-width:22px}
  .cd-num{
    font-family:'Cormorant Garamond',serif;
    font-weight:700;
    font-size:19px;
    line-height:1;
    color:var(--white);
    font-variant-numeric:tabular-nums;
  }
  .cd-lbl{
    font-size:6.5px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--gold);
    opacity:.85;
    margin-top:2px;
    font-weight:500;
  }
  .cd-sep{
    color:var(--gold);
    opacity:.35;
    font-size:15px;
    font-family:'Cormorant Garamond',serif;
    transform:translateY(-3px);
  }

  .site-url{
    margin-left:auto;
    font-size:8.5px;
    letter-spacing:.24em;
    text-transform:uppercase;
    color:var(--gold);
    opacity:.65;
    font-weight:500;
    white-space:nowrap;
    padding-left:8px;
  }

  /* bottom tagline — "where ProjectX…" left deliberately open */
  .tagline{
    margin-top:7px;
    padding-top:6px;
    border-top:1px solid rgba(212,168,67,0.12);
    text-align:center;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-weight:500;
    font-size:11px;
    letter-spacing:.08em;
    color:rgba(245,241,235,0.55);
  }
  .tagline .dots{
    color:var(--gold);
    opacity:.7;
    letter-spacing:.2em;
    margin-left:1px;
  }

  /* live state */
  .widget.live .countdown{display:none}
  .live-badge{
    display:none;
    align-items:center;
    gap:7px;
  }
  .widget.live .live-badge{display:flex}
  .live-dot{
    width:7px;height:7px;border-radius:50%;
    background:#C0392B;
    box-shadow:0 0 9px rgba(192,57,43,0.8);
    animation:pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%    {opacity:.55;transform:scale(1.25)}
  }
  .live-text{
    font-size:11px;
    font-weight:600;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--white);
  }
  .live-text em{font-style:normal;color:var(--gold)}
</style>
</head>
<body>

<div class="widget pos-tl" id="widget">

  <!-- ========== TOP: WATCH ME LIVE ON KICK ========== -->
  <div class="watch-headline">
    <span class="kick-dot"></span>
    Come watch me live at
    <span class="kick-dot"></span>
  </div>
  <div class="watch-row">
    <span class="watch-empirex">EMPIRE<span class="x">X</span></span>
    <span class="on-word">on</span>
    <img class="kick-logo"
         src="https://ourempirex.com/promo/kick-logo.png"
         alt="Kick"
         onerror="this.style.display='none'">
  </div>

  <div class="split"></div>

  <!-- ========== BOTTOM: COUNTDOWN ========== -->
  <div class="bottom-row">
    <img class="logo-gold"
         src="https://ourempirex.com/promo/logo.png"
         alt="Our Empire"
         onerror="this.style.display='none'">

    <div class="countdown" id="countdown">
      <div class="cd-unit"><span class="cd-num" id="d">--</span><span class="cd-lbl">Days</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span class="cd-num" id="h">--</span><span class="cd-lbl">Hrs</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span class="cd-num" id="m">--</span><span class="cd-lbl">Min</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span class="cd-num" id="s">--</span><span class="cd-lbl">Sec</span></div>
    </div>

    <div class="live-badge">
      <span class="live-dot"></span>
      <span class="live-text">LIVE · JUN 11–15</span>
    </div>

    <div class="site-url">ourempirex.com</div>
  </div>

  <div class="tagline">Where ProjectX Meets IRL · June 11–15, 2026</div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const pos = (params.get('pos') || 'tl').toLowerCase();
  const widget = document.getElementById('widget');
  if (['tl','tr','bl','br'].includes(pos)){
    widget.classList.remove('pos-tl');
    widget.classList.add('pos-' + pos);
  }

  const TARGET    = new Date('2026-06-11T16:00:00-04:00').getTime();
  const EVENT_END = new Date('2026-06-15T23:59:59-04:00').getTime();

  const el = {
    d: document.getElementById('d'),
    h: document.getElementById('h'),
    m: document.getElementById('m'),
    s: document.getElementById('s'),
  };
  const pad = n => String(n).padStart(2,'0');

  function tick(){
    const now = Date.now();
    const diff = TARGET - now;
    if (diff <= 0){
      if (now <= EVENT_END){
        widget.classList.add('live');
      } else {
        widget.style.opacity = '0';
        widget.style.transition = 'opacity 1s ease';
      }
      return;
    }
    widget.classList.remove('live');
    el.d.textContent = pad(Math.floor(diff / 86400000));
    el.h.textContent = pad(Math.floor((diff % 86400000) / 3600000));
    el.m.textContent = pad(Math.floor((diff % 3600000) / 60000));
    el.s.textContent = pad(Math.floor((diff % 60000) / 1000));
  }
  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
